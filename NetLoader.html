<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Net Loader // NEX</title>
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --border: #1a1a1a;
            --text: #c0c0c0;
            --text-bright: #ffffff;
            --text-dim: #666666;
            --accent: #ffffff;
            --glow: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Courier New', 'Fira Code', 'Consolas', 'Monaco', monospace;
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            user-select: none;
            padding: 12px;
        }

        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.08) 2px,
                rgba(0, 0, 0, 0.08) 4px
            );
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }

        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.15;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 600px;
        }

        .terminal {
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid var(--border);
            border-radius: 2px;
            box-shadow: 
                0 0 0 1px rgba(255,255,255,0.03),
                0 20px 60px rgba(0,0,0,0.8),
                inset 0 0 100px rgba(255,255,255,0.005);
            overflow: hidden;
        }

        .terminal-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: #0d0d0d;
            border-bottom: 1px solid var(--border);
        }

        .terminal-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid #333;
            background: #1a1a1a;
        }
        .terminal-dot:nth-child(1) { background: #333; }
        .terminal-dot:nth-child(2) { background: #333; }
        .terminal-dot:nth-child(3) { background: #333; }

        .terminal-title {
            flex: 1;
            text-align: center;
            font-size: 11px;
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .terminal-body {
            padding: 30px 25px 25px;
        }

        .ascii-logo {
            text-align: center;
            font-size: 10px;
            line-height: 1.1;
            color: #555;
            margin-bottom: 20px;
            white-space: pre;
            letter-spacing: 0;
            animation: flickerText 4s infinite;
        }

        @keyframes flickerText {
            0%, 100% { opacity: 1; }
            8% { opacity: 0.7; }
            10% { opacity: 1; }
            30% { opacity: 0.85; }
            33% { opacity: 1; }
            55% { opacity: 0.6; }
            57% { opacity: 1; }
            92% { opacity: 0.8; }
            94% { opacity: 1; }
        }

        .glitch-wrapper {
            text-align: center;
            margin-bottom: 8px;
        }

        .glitch {
            font-size: 2.2em;
            font-weight: bold;
            color: var(--text-bright);
            letter-spacing: 6px;
            position: relative;
            display: inline-block;
            text-transform: uppercase;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.6;
        }

        .glitch::before {
            color: #888;
            z-index: -1;
            animation: glitchAnim 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) both infinite;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        }

        .glitch::after {
            color: #444;
            z-index: -2;
            animation: glitchAnim 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) reverse both infinite;
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
        }

        @keyframes glitchAnim {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(3px, -1px); }
            60% { transform: translate(-1px, -2px); }
            80% { transform: translate(2px, 1px); }
            100% { transform: translate(0); }
        }

        .subtitle {
            text-align: center;
            font-size: 10px;
            color: #444;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .subtitle .blink {
            animation: blink 1s step-end infinite;
            color: #666;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .input-line {
            display: flex;
            align-items: center;
            background: #050505;
            border: 1px solid var(--border);
            border-radius: 1px;
            padding: 0;
            position: relative;
            transition: all 0.2s ease;
        }

        .input-line:focus-within {
            border-color: #444;
            box-shadow: 0 0 20px var(--glow);
        }

        .prompt {
            padding: 16px 14px;
            color: #555;
            font-size: 14px;
            font-weight: bold;
            border-right: 1px solid #1a1a1a;
            background: #0a0a0a;
            letter-spacing: 2px;
        }

        .url-input {
            flex: 1;
            padding: 16px 16px;
            background: transparent;
            border: none;
            color: var(--text-bright);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            letter-spacing: 1px;
            caret-color: #fff;
        }

        .url-input::placeholder {
            color: #333;
            letter-spacing: 1px;
        }

        .url-input:focus::placeholder {
            color: #444;
        }

        .command-btn {
            width: 100%;
            margin-top: 15px;
            padding: 16px;
            background: #0f0f0f;
            border: 1px solid #222;
            color: var(--text-bright);
            font-family: inherit;
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .command-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            transition: left 0.5s ease;
        }

        .command-btn:hover::before {
            left: 100%;
        }

        .command-btn:hover {
            background: #1a1a1a;
            border-color: #555;
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
        }

        .command-btn:active {
            background: #000;
            border-color: #fff;
        }

        .command-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .command-btn .cmd-prompt {
            color: #555;
            margin-right: 6px;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #333;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .output-area {
            margin-top: 20px;
            border: 1px solid var(--border);
            background: #050505;
            border-radius: 1px;
            display: none;
        }

        .output-area.show {
            display: block;
        }

        .output-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-bottom: 1px solid #1a1a1a;
            font-size: 10px;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .output-header .status-dot {
            width: 7px;
            height: 7px;
            background: #555;
            border-radius: 50%;
        }
        .output-header .status-dot.active {
            background: #fff;
            box-shadow: 0 0 6px #fff;
        }

        .output-body {
            padding: 14px;
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 12px;
            color: #999;
            letter-spacing: 1px;
        }

        .file-icon {
            font-size: 28px;
            opacity: 0.8;
        }

        .file-details {
            flex: 1;
            min-width: 0;
        }
        .file-name {
            color: var(--text-bright);
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: 0.5px;
        }
        .file-meta {
            color: #555;
            font-size: 10px;
            margin-top: 3px;
        }

        .dl-btn {
            display: block;
            width: 100%;
            margin-top: 12px;
            padding: 14px;
            background: #0a0a0a;
            border: 1px solid #333;
            color: var(--text-bright);
            font-family: inherit;
            font-size: 13px;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .dl-btn:hover {
            background: #111;
            border-color: #fff;
            box-shadow: 0 0 25px rgba(255,255,255,0.06);
        }

        .log-line {
            font-size: 10px;
            color: #444;
            margin-top: 8px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .log-line .timestamp {
            color: #333;
        }
        .log-line.success {
            color: #999;
        }
        .log-line.error {
            color: #666;
        }
        .log-line a {
            color: #777;
        }

        .footer {
            position: fixed;
            bottom: 20px;
            right: 25px;
            z-index: 10;
            font-size: 10px;
            color: #2a2a2a;
            letter-spacing: 3px;
            text-transform: uppercase;
            pointer-events: none;
        }

        .footer span {
            color: #444;
        }

        /* মোবাইল অ্যাডজাস্টমেন্ট */
        @media (max-width: 500px) {
            .terminal-body {
                padding: 20px 15px;
            }
            .glitch {
                font-size: 1.5em;
                letter-spacing: 3px;
            }
            .ascii-logo {
                font-size: 8px;
            }
            .subtitle {
                font-size: 8px;
                letter-spacing: 2px;
                margin-bottom: 20px;
            }
            .prompt {
                padding: 14px 10px;
                font-size: 12px;
            }
            .url-input {
                font-size: 12px;
                padding: 14px 10px;
            }
            .url-input::placeholder {
                font-size: 10px;
            }
            .command-btn {
                font-size: 11px;
                letter-spacing: 2px;
                padding: 14px;
            }
            .footer {
                bottom: 10px;
                right: 14px;
                font-size: 9px;
            }
        }
    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div class="noise"></div>
    <canvas id="matrixCanvas"></canvas>

    <div class="container">
        <div class="terminal">
            <div class="terminal-header">
                <div class="terminal-dot"></div>
                <div class="terminal-dot"></div>
                <div class="terminal-dot"></div>
                <div class="terminal-title">net_loader_v4.terminal</div>
            </div>

            <div class="terminal-body">
                <div class="ascii-logo">
█▄░█ █▀▀ ▀█▀   █░░ █▀█ ▄▀█ █▀▄ █▀▀ █▀█
█░▀█ ██▄ ░█░   █▄▄ █▄█ █▀█ █▄▀ ██▄ █▀▄
                </div>

                <div class="glitch-wrapper">
                    <div class="glitch" data-text="NET LOADER">NET LOADER</div>
                </div>

                <div class="subtitle">
                    [ <span class="blink">▌</span> universal_payload_retriever ]
                </div>

                <div class="input-line">
                    <span class="prompt">root@nex:~$</span>
                    <input
                        type="text"
                        class="url-input"
                        id="urlInput"
                        placeholder="paste_target_url_here..."
                        autocomplete="off"
                        spellcheck="false"
                        enterkeyhint="go"
                    >
                </div>

                <button class="command-btn" id="fetchBtn">
                    <span class="cmd-prompt">></span> execute_fetch
                </button>

                <div class="output-area" id="outputArea">
                    <div class="output-header">
                        <span class="status-dot active"></span>
                        <span>// payload_extracted</span>
                    </div>
                    <div class="output-body">
                        <div class="file-info">
                            <span class="file-icon">📦</span>
                            <div class="file-details">
                                <div class="file-name" id="fileName">target.file</div>
                                <div class="file-meta" id="fileMeta">size: unknown | type: auto-detected</div>
                            </div>
                        </div>
                        <button class="dl-btn" id="dlBtn">
                            [ DOWNLOAD_PAYLOAD ]
                        </button>
                        <div class="log-line success" id="logLine">
                            <span class="timestamp">[OK]</span> payload ready for extraction...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">Made By <span>Nex</span></div>

    <script>
        // ========== ম্যাট্রিক্স রেইন ==========
        (function matrixRain() {
            const canvas = document.getElementById('matrixCanvas');
            const ctx = canvas.getContext('2d');
            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);
            const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
            const fontSize = 14;
            const columns = Math.floor(canvas.width / fontSize);
            const drops = new Array(columns).fill(0);
            function draw() {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = fontSize + 'px "Courier New", monospace';
                for (let i = 0; i < drops.length; i++) {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    const x = i * fontSize;
                    const y = drops[i] * fontSize;
                    const brightness = Math.random();
                    if (brightness > 0.7) ctx.fillStyle = '#ffffff';
                    else if (brightness > 0.4) ctx.fillStyle = '#888888';
                    else ctx.fillStyle = '#333333';
                    ctx.fillText(text, x, y);
                    if (y > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(draw, 40);
        })();

        // ========== DOM ==========
        const urlInput = document.getElementById('urlInput');
        const fetchBtn = document.getElementById('fetchBtn');
        const outputArea = document.getElementById('outputArea');
        const fileName = document.getElementById('fileName');
        const fileMeta = document.getElementById('fileMeta');
        const dlBtn = document.getElementById('dlBtn');
        const logLine = document.getElementById('logLine');
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || window.innerWidth < 600;

        let currentDownloadUrl = null;
        let currentPlatform = '';

        // ========== প্ল্যাটফর্ম ডিটেক্ট ==========
        function detectPlatform(url) {
            const u = url.toLowerCase();
            if (u.includes('tiktok.com')) return 'TikTok';
            if (u.includes('youtube.com') || u.includes('youtu.be')) return 'YouTube';
            if (u.includes('facebook.com') || u.includes('fb.watch') || u.includes('fb.com')) return 'Facebook';
            if (u.includes('instagram.com')) return 'Instagram';
            return 'Unknown';
        }

        // ========== API: cobalt (প্রাইমারি - সব প্ল্যাটফর্মের জন্য) ==========
        async function fetchCobalt(url) {
            const res = await fetch('https://api.cobalt.tools/api/json', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json',
                },
                body: JSON.stringify({
                    url: url,
                    vQuality: 'max',
                    aFormat: 'best',
                    isAudioOnly: false,
                    isNoTTWatermark: true,
                }),
                signal: AbortSignal.timeout(20000),
            });

            if (!res.ok) {
                const errText = await res.text();
                throw new Error('HTTP ' + res.status + ': ' + errText.substring(0, 100));
            }

            const data = await res.json();

            if (data.status === 'error' || data.error) {
                throw new Error(data.error?.message || data.error || 'cobalt_error');
            }

            let dlUrl = data.url;
            // পিকার থাকলে বেস্ট কোয়ালিটি নিবো
            if (data.picker && data.picker.length > 0) {
                const best = data.picker[data.picker.length - 1];
                dlUrl = best.url || data.url;
            }

            if (!dlUrl) throw new Error('no_url_from_cobalt');

            return {
                url: dlUrl,
                title: data.title || 'video',
                type: (data.isAudio || data.type === 'audio') ? 'audio/mpeg' : 'video/mp4',
                platform: 'Cobalt',
            };
        }

        // ========== API: tikwm (টিকটক ব্যাকআপ) ==========
        async function fetchTikwm(url) {
            const res = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}&hd=1`, {
                signal: AbortSignal.timeout(15000),
            });
            const data = await res.json();
            if (data.code === 0 && data.data) {
                const dl = data.data.hdplay || data.data.play || data.data.wmplay;
                if (dl) return {
                    url: dl,
                    title: data.data.title || 'TikTok',
                    type: 'video/mp4',
                    platform: 'TikTok',
                };
            }
            throw new Error('tikwm_failed');
        }

        // ========== API: tikcdn (টিকটক ব্যাকআপ ২) ==========
        async function fetchTikcdn(url) {
            const res = await fetch(`https://tikcdn.io/api?url=${encodeURIComponent(url)}`, {
                signal: AbortSignal.timeout(15000),
            });
            const d = await res.json();
            if (d.videoUrl) return {
                url: d.videoUrl,
                title: d.title || 'TikTok',
                type: 'video/mp4',
                platform: 'TikTok',
            };
            throw new Error('tikcdn_failed');
        }

        // ========== API: loader.to (ইউটিউব ব্যাকআপ) ==========
        async function fetchLoaderTo(url) {
            const res = await fetch(`https://loader.to/api/card/?url=${encodeURIComponent(url)}&format=mp4`, {
                signal: AbortSignal.timeout(15000),
            });
            const d = await res.json();
            if (d.success && d.url) return {
                url: d.url,
                title: d.title || 'YouTube',
                type: 'video/mp4',
                platform: 'YouTube',
            };
            throw new Error('loader_to_failed');
        }

        // ========== এক্সটার্নাল ফলব্যাক URL ==========
        function getExternalUrl(platform, originalUrl) {
            const encoded = encodeURIComponent(originalUrl);
            switch (platform) {
                case 'YouTube': return 'https://en.savefrom.net/1-youtube-video-downloader-1/?url=' + encoded;
                case 'TikTok': return 'https://snaptik.app/?url=' + encoded;
                case 'Facebook': return 'https://www.fbdown.net/download.php?url=' + encoded;
                case 'Instagram': return 'https://saveig.app/?url=' + encoded;
                default: return 'https://en.savefrom.net/?url=' + encoded;
            }
        }

        // ========== মেইন হ্যান্ডলার ==========
        async function handleFetch() {
            const url = urlInput.value.trim();

            if (!url) {
                showError('no url provided...');
                return;
            }

            try { new URL(url); } catch (e) {
                showError('invalid url format...');
                return;
            }

            const platform = detectPlatform(url);
            currentPlatform = platform;

            fetchBtn.disabled = true;
            fetchBtn.innerHTML = '<span class="spinner"></span> scanning_' + platform.toLowerCase() + '...';
            outputArea.classList.remove('show');
            currentDownloadUrl = null;
            dlBtn.textContent = '[ DOWNLOAD_PAYLOAD ]';

            let result = null;
            const errors = [];

            // ===== স্ট্র্যাটেজি: প্ল্যাটফর্ম অনুযায়ী API চেইন =====
            try {
                // Step 1: সবসময় cobalt ট্রাই করি প্রথমে (সব প্ল্যাটফর্ম সাপোর্ট করে)
                try {
                    result = await fetchCobalt(url);
                } catch (e) {
                    errors.push('cobalt: ' + e.message);
                }

                // Step 2: cobalt fail করলে প্ল্যাটফর্ম-স্পেসিফিক API
                if (!result && platform === 'TikTok') {
                    try { result = await fetchTikwm(url); } catch (e) { errors.push('tikwm: ' + e.message); }
                    if (!result) {
                        try { result = await fetchTikcdn(url); } catch (e) { errors.push('tikcdn: ' + e.message); }
                    }
                }

                if (!result && platform === 'YouTube') {
                    try { result = await fetchLoaderTo(url); } catch (e) { errors.push('loader: ' + e.message); }
                }

                // Step 3: এখনো fail? এক্সটার্নাল লিংক
                if (!result) {
                    const extUrl = getExternalUrl(platform, url);
                    currentDownloadUrl = extUrl;
                    fileName.textContent = 'open_external_service';
                    fileMeta.textContent = platform + ' | external';
                    dlBtn.textContent = '[ OPEN EXTERNAL ]';
                    logLine.innerHTML = '<span class="timestamp">[WARN]</span> using external service...';
                    logLine.className = 'log-line error';
                    outputArea.classList.add('show');
                    return;
                }

                // সাকসেস!
                currentDownloadUrl = result.url;
                const cleanTitle = (result.title || 'payload').replace(/[<>:"/\\|?*]/g, '').substring(0, 35);
                const ext = result.type === 'audio/mpeg' ? '.mp3' : '.mp4';
                fileName.textContent = cleanTitle + ext;
                fileMeta.textContent = platform + ' | ' + (ext === '.mp3' ? 'audio' : 'video');
                logLine.innerHTML = '<span class="timestamp">[OK]</span> ' + platform + ' payload ready...';
                logLine.className = 'log-line success';
                dlBtn.textContent = '[ DOWNLOAD_PAYLOAD ]';
                outputArea.classList.add('show');

            } catch (finalErr) {
                console.error('All APIs failed:', errors);
                showError('extraction failed: ' + (errors[errors.length - 1] || finalErr.message).substring(0, 50));
            } finally {
                fetchBtn.disabled = false;
                fetchBtn.innerHTML = '<span class="cmd-prompt">></span> execute_fetch';
            }
        }

        function showError(msg) {
            logLine.innerHTML = '<span class="timestamp">[ERR]</span> ' + msg;
            logLine.className = 'log-line error';
            outputArea.classList.add('show');
            currentDownloadUrl = null;
            dlBtn.textContent = '[ DOWNLOAD_PAYLOAD ]';
            fileName.textContent = 'error_occurred';
            fileMeta.textContent = 'try again with different link';
        }

        // ========== ডাউনলোড বাটন ==========
        dlBtn.addEventListener('click', () => {
            if (!currentDownloadUrl) {
                logLine.innerHTML = '<span class="timestamp">[ERR]</span> no payload in memory...';
                logLine.className = 'log-line error';
                return;
            }

            // এক্সটার্নাল লিংক হলে নতুন ট্যাবে ওপেন
            if (currentDownloadUrl.includes('savefrom.net') || 
                currentDownloadUrl.includes('snaptik.app') ||
                currentDownloadUrl.includes('fbdown.net') ||
                currentDownloadUrl.includes('saveig.app')) {
                window.open(currentDownloadUrl, '_blank', 'noopener,noreferrer');
                logLine.innerHTML = '<span class="timestamp">[>>]</span> external service opened...';
                logLine.className = 'log-line success';
                return;
            }

            // ডিরেক্ট ডাউনলোড - মোবাইলের জন্য window.open বেশি reliable
            if (isMobile) {
                // মোবাইলে window.open দিয়ে ডাউনলোড ট্রিগার
                const newWindow = window.open(currentDownloadUrl, '_blank', 'noopener,noreferrer');
                if (!newWindow) {
                    // পপআপ ব্লক হলে ফলব্যাক
                    const a = document.createElement('a');
                    a.href = currentDownloadUrl;
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.download = '';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                }
            } else {
                // ডেস্কটপে a.click() method
                const a = document.createElement('a');
                a.href = currentDownloadUrl;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                try {
                    const urlObj = new URL(currentDownloadUrl);
                    a.download = urlObj.pathname.split('/').pop() || 'netloader_video.mp4';
                } catch (e) {
                    a.download = 'netloader_video.mp4';
                }
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }

            logLine.innerHTML = '<span class="timestamp">[>>]</span> download initiated...';
            logLine.className = 'log-line success';
        });

        // ========== এন্টার ==========
        urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleFetch();
        });

        // ========== মোবাইলে ক্লিপবোর্ড অটো-পেস্ট ==========
        urlInput.addEventListener('click', async () => {
            if (isMobile && !urlInput.value) {
                try {
                    const clipText = await navigator.clipboard.readText();
                    if (clipText && clipText.length > 10 && clipText.startsWith('http')) {
                        urlInput.value = clipText;
                    }
                } catch (e) {}
            }
        });

        urlInput.focus();

        console.log('%c[ NET LOADER v4 ]%c // YT · TT · FB · IG // Made By Nex',
            'color:#fff;font-weight:bold;', 'color:#888;');
        console.log('%c[ STRATEGY ]%c cobalt → platform_api → external_fallback',
            'color:#fff;', 'color:#666;');
    </script>
</body>
</html>
