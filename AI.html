<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEEK_TERMINAL v2 // DEBUG MODE</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --panel: #0d1117;
            --neon: #00ff41;
            --neon-dim: #00cc33;
            --cyan: #00ffff;
            --red: #ff3333;
            --yellow: #ffcc00;
            --orange: #ff9900;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --border: #1f2937;
            --font: 'Courier New', 'Fira Code', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
        }
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg,
                    transparent, transparent 2px,
                    rgba(0, 255, 65, 0.012) 2px,
                    rgba(0, 255, 65, 0.012) 4px);
            pointer-events: none;
            z-index: 9999;
        }

        .header {
            background: var(--panel);
            border-bottom: 2px solid var(--neon);
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        .logo-icon {
            font-size: 24px;
            flex-shrink: 0;
        }
        .logo-text {
            font-size: 13px;
            font-weight: bold;
            color: var(--neon);
            letter-spacing: 2px;
            text-shadow: 0 0 8px var(--neon);
            white-space: nowrap;
        }
        .logo-sub {
            font-size: 9px;
            color: var(--text-dim);
            display: block;
            letter-spacing: 1px;
            text-shadow: none;
            font-weight: normal;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--red);
            box-shadow: 0 0 10px var(--red);
            flex-shrink: 0;
            transition: all 0.5s;
        }
        .status-dot.online {
            background: var(--neon);
            box-shadow: 0 0 15px var(--neon);
            animation: glow 1.5s infinite;
        }
        .status-dot.loading {
            background: var(--orange);
            box-shadow: 0 0 10px var(--orange);
            animation: blink 0.6s infinite;
        }
        @keyframes glow {
            0%,
            100% {
                box-shadow: 0 0 10px var(--neon);
            }
            50% {
                box-shadow: 0 0 25px var(--neon), 0 0 40px var(--neon-dim);
            }
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            -webkit-overflow-scrolling: touch;
        }
        .chat-container::-webkit-scrollbar {
            width: 2px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: var(--neon-dim);
            border-radius: 2px;
        }

        .msg {
            max-width: 92%;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.5;
            word-break: break-word;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .msg.user {
            align-self: flex-end;
            background: #0f1f15;
            border: 1px solid var(--neon-dim);
            color: #b8ffc4;
            border-radius: 10px 3px 10px 10px;
        }
        .msg.ai {
            align-self: flex-start;
            background: #0f1622;
            border: 1px solid #1e3a5f;
            color: #c9e4ff;
            border-radius: 3px 10px 10px 10px;
        }
        .msg.system-msg {
            align-self: center;
            background: transparent;
            border: 1px dashed #222;
            color: var(--text-dim);
            font-size: 10px;
            text-align: center;
            max-width: 100%;
        }
        .msg.error-msg {
            align-self: center;
            background: #1a0000;
            border: 1px solid var(--red);
            color: #ff6666;
            font-size: 10px;
            text-align: center;
            max-width: 95%;
        }
        .msg.success-msg {
            align-self: center;
            background: #001a00;
            border: 1px solid var(--neon);
            color: var(--neon);
            font-size: 10px;
            text-align: center;
        }
        .msg .sender {
            font-size: 9px;
            letter-spacing: 2px;
            margin-bottom: 3px;
            opacity: 0.7;
        }
        .msg.user .sender {
            color: var(--neon);
        }
        .msg.ai .sender {
            color: var(--cyan);
        }

        .input-area {
            background: var(--panel);
            border-top: 1px solid var(--border);
            padding: 8px 10px;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
            position: sticky;
            bottom: 0;
        }
        .input-area input {
            flex: 1;
            background: #161b22;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 5px;
            font-family: var(--font);
            font-size: 13px;
            outline: none;
            min-width: 0;
            transition: all 0.3s;
        }
        .input-area input:focus {
            border-color: var(--neon);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }
        .input-area input::placeholder {
            color: #333;
        }
        .btn {
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 10px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.3s;
        }
        .btn:active {
            background: var(--neon);
            color: #000;
        }
        .btn:disabled {
            border-color: #333;
            color: #333;
            cursor: not-allowed;
        }
        .btn-sm {
            font-size: 10px;
            padding: 6px 10px;
            letter-spacing: 0;
        }

        @media (max-width: 480px) {
            .header {
                padding: 8px 10px;
            }
            .logo-icon {
                font-size: 20px;
            }
            .logo-text {
                font-size: 11px;
            }
            .logo-sub {
                font-size: 8px;
            }
            .msg {
                max-width: 96%;
                font-size: 11px;
                padding: 6px 10px;
            }
            .input-area {
                padding: 6px 8px;
                gap: 4px;
            }
            .input-area input {
                padding: 8px 10px;
                font-size: 12px;
            }
            .btn {
                padding: 8px 10px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">
            <span class="logo-icon">💀</span>
            <span>
                <span class="logo-text">FEEK_TERMINAL</span>
                <span class="logo-sub">// v2.0 DEBUG MODE</span>
            </span>
        </div>
        <button class="btn btn-sm" onclick="retryLoad()" id="retryBtn">RETRY 🔄</button>
        <div class="status-dot" id="statusDot" title="STATUS"></div>
    </div>

    <div class="chat-container" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="কমান্ড... (Enter)" onkeydown="if(event.key==='Enter')sendMsg()" autocomplete="off" disabled>
        <button class="btn" id="sendBtn" onclick="sendMsg()" disabled>SEND ▸</button>
    </div>

    <script type="module">
        import { MLCEngine } from "https://esm.run/@mlc-ai/web-llm";

        // ===== SYSTEM PROMPT =====
        const SYSTEM_PROMPT = `তুই ফিক (Feek) - একজন কুল হ্যাকার অ্যাসিস্ট্যান্ট। তুই বাংলায় কথা বলবি, ইমোজি ইউজ করবি, কোড দিলে প্রপার ফরম্যাটে দিবি। তুই হ্যাকিং, প্রোগ্রামিং, সাইবার সিকিউরিটির এক্সপার্ট।`;

        // ===== GLOBALS =====
        let engine = null;
        let isReady = false;
        let history = [{ role: "system", content: SYSTEM_PROMPT }];

        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const retryBtn = document.getElementById('retryBtn');

        // ===== HELPERS =====
        function log(msg, cls = 'system-msg') {
            const d = document.createElement('div');
            d.className = 'msg ' + cls;
            d.innerHTML = msg;
            chatBox.appendChild(d);
            requestAnimationFrame(() => chatBox.scrollTop = chatBox.scrollHeight);
        }

        function logError(msg) { log('❌ ' + msg, 'error-msg'); }

        function logSuccess(msg) { log('✅ ' + msg, 'success-msg'); }

        function setStatus(s) {
            statusDot.className = 'status-dot';
            if (s === 'online') { statusDot.classList.add('online');
                statusDot.title = 'ONLINE'; } else if (s === 'loading') { statusDot.classList.add('loading');
                statusDot.title = 'LOADING...'; } else { statusDot.title = 'OFFLINE'; }
        }

        function enableInput(yes) {
            userInput.disabled = !yes;
            sendBtn.disabled = !yes;
            if (yes) userInput.focus();
        }

        // ===== INIT =====
        async function initModel() {
            setStatus('loading');
            enableInput(false);
            isReady = false;
            retryBtn.disabled = true;

            log('🔍 <b>WebGPU চেক:</b> ' + (navigator.gpu ? '<span style="color:#0f0">YES ✅</span>' :
                '<span style="color:#f00">NO ❌</span>'));
            log('🌐 <b>Browser:</b> ' + navigator.userAgent.match(/(Chrome|Edge|Firefox|Safari)\/[0-9.]+/)?.[0] ||
                'Unknown');
            log('📱 <b>Platform:</b> ' + navigator.platform);

            if (!navigator.gpu) {
                logError('WebGPU NOT AVAILABLE!<br><br>👉 Chrome 121+ লাগবে<br>👉 Edge 121+ লাগবে<br>👉 Firefox/Safari কাজ করবে না<br>👉 iPhone/iPad কাজ করবে না');
                log('💡 <b>সলিউশন:</b> Chrome Browser ইন্সটল করো');
                setStatus('offline');
                retryBtn.disabled = false;
                return;
            }

            log('⏳ মডেল লোড হচ্ছে... (<b>Gemma 2B ~1.4GB</b>)');
            log('⏱️ প্রথমবার ২-৫ মিনিট লাগবে, WiFi চালু রাখো');
            log('💾 এরপর অটো ক্যাশ হবে IndexedDB তে');

            try {
                const startTime = Date.now();
                engine = await MLCEngine.create({
                    model: "gemma-2-2b-it-q4f16_1-MLC",
                    modelCache: "indexedDB",
                    // Progress callback
                    initProgressCallback: (report) => {
                        const pct = report.progress ? (report.progress * 100).toFixed(1) : '?';
                        log(`📥 ডাউনলোড: <b>${pct}%</b> — ${report.text || ''}`);
                    },
                });
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

                isReady = true;
                setStatus('online');
                enableInput(true);
                retryBtn.disabled = false;
                logSuccess(`AI READY! (${elapsed} সেকেন্ড)<br>প্রশ্ন করো ব্রো... 💀🚀`);
                userInput.focus();

            } catch (err) {
                console.error('MLCEngine error:', err);
                const msg = err.message || String(err);
                logError('মডেল লোড ফেইল!<br><br><b>কারণ:</b> ' + msg.replace(/</g, '&lt;'));
                if (msg.includes('fetch') || msg.includes('network') || msg.includes('Failed to fetch')) {
                    logError('নেটওয়ার্ক ইস্যু! HuggingFace CDN ব্লক হতে পারে');
                    log('💡 VPN ট্রাই করো অথবা অন্য নেটওয়ার্ক');
                }
                if (msg.includes('quota') || msg.includes('storage')) {
                    logError('স্টোরেজ ফুল! IndexedDB ক্লিয়ার করো');
                    log('💡 Chrome Settings → Site Settings → Storage → Clear');
                }
                if (msg.includes('WebGPU')) {
                    logError('WebGPU ইনিশিয়ালাইজেশন ফেইল');
                    log('💡 chrome://flags → WebGPU → Enabled');
                }
                setStatus('offline');
                retryBtn.disabled = false;
            }
        }

        // ===== RETRY =====
        window.retryLoad = function() {
            chatBox.innerHTML = '';
            log('🔄 রিট্রাই করছি...');
            if (engine) {
                try { engine.reset(); } catch (e) {}
                engine = null;
            }
            history = [{ role: "system", content: SYSTEM_PROMPT }];
            initModel();
        };

        // ===== SEND =====
        window.sendMsg = async function() {
            if (!isReady || !engine) return;
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            enableInput(false);

            // User msg
            const uDiv = document.createElement('div');
            uDiv.className = 'msg user';
            uDiv.innerHTML = '<div class="sender">[YOU]</div>' + text.replace(/</g, '&lt;').replace(/\n/g, '<br>');
            chatBox.appendChild(uDiv);
            history.push({ role: "user", content: text });

            // Typing
            const tDiv = document.createElement('div');
            tDiv.className = 'msg ai';
            tDiv.id = 'typing';
            tDiv.innerHTML = '<span style="color:#00ffff;">⏳ চিন্তা করছে...</span>';
            chatBox.appendChild(tDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const reply = await engine.chat(history);
                document.getElementById('typing')?.remove();

                const aDiv = document.createElement('div');
                aDiv.className = 'msg ai';
                const fmt = reply
                    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre style="background:#000;border:1px solid #333;padding:8px;border-radius:3px;overflow-x:auto;font-size:10px;color:#0f0;">$2</pre>')
                    .replace(/`([^`]+)`/g, '<code style="background:rgba(0,0,0,0.4);padding:1px 5px;border-radius:2px;color:#ff0;">$1</code>')
                    .replace(/\n/g, '<br>');
                aDiv.innerHTML = '<div class="sender">[FEEK]</div>' + fmt;
                chatBox.appendChild(aDiv);
                history.push({ role: "assistant", content: reply });

                if (history.length > 22) {
                    history = [history[0], ...history.slice(-20)];
                }
            } catch (err) {
                document.getElementById('typing')?.remove();
                logError('রিপ্লাই জেনারেশন ফেইল: ' + (err.message || err));
                history.pop();
            }

            enableInput(true);
            chatBox.scrollTop = chatBox.scrollHeight;
            userInput.focus();
        };

        // ===== START =====
        log('💀 <b>FEEK_TERMINAL v2.0</b> — DEBUG MODE');
        log('🔗 সব স্ট্যাটাস এখানে দেখতে পারবি...');
        initModel();
    </script>
</body>
</html>
