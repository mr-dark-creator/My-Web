<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEEK_TERMINAL // Gemini API</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --panel: #0d1117;
            --neon: #00ff41;
            --cyan: #00ffff;
            --red: #ff3333;
            --orange: #ff9900;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --border: #1f2937;
            --font: 'Courier New', 'Fira Code', monospace;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
        }
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg,
                    transparent, transparent 2px,
                    rgba(0, 255, 65, 0.012) 2px,
                    rgba(0, 255, 65, 0.012) 4px);
            pointer-events: none;
            z-index: 9999;
        }
        .header {
            background: var(--panel);
            border-bottom: 2px solid var(--neon);
            padding: 10px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        .logo-icon {
            font-size: 22px;
            flex-shrink: 0;
        }
        .logo-text {
            font-size: 12px;
            font-weight: bold;
            color: var(--neon);
            letter-spacing: 2px;
            text-shadow: 0 0 8px var(--neon);
            white-space: nowrap;
        }
        .logo-sub {
            font-size: 8px;
            color: var(--text-dim);
            display: block;
            letter-spacing: 1px;
            text-shadow: none;
            font-weight: normal;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--red);
            flex-shrink: 0;
            transition: all 0.5s;
        }
        .status-dot.online {
            background: var(--neon);
            box-shadow: 0 0 15px var(--neon);
            animation: glow 1.5s infinite;
        }
        @keyframes glow {
            0%,
            100% {
                box-shadow: 0 0 10px var(--neon);
            }
            50% {
                box-shadow: 0 0 25px var(--neon);
            }
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            -webkit-overflow-scrolling: touch;
        }
        .chat-container::-webkit-scrollbar {
            width: 2px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: var(--neon);
            border-radius: 2px;
        }
        .msg {
            max-width: 92%;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.5;
            word-break: break-word;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .msg.user {
            align-self: flex-end;
            background: #0f1f15;
            border: 1px solid var(--neon);
            color: #b8ffc4;
            border-radius: 10px 3px 10px 10px;
        }
        .msg.ai {
            align-self: flex-start;
            background: #0f1622;
            border: 1px solid #1e3a5f;
            color: #c9e4ff;
            border-radius: 3px 10px 10px 10px;
        }
        .msg.system-msg {
            align-self: center;
            background: transparent;
            border: 1px dashed #222;
            color: var(--text-dim);
            font-size: 10px;
            text-align: center;
            max-width: 100%;
        }
        .msg.error-msg {
            align-self: center;
            background: #1a0000;
            border: 1px solid var(--red);
            color: #ff6666;
            font-size: 10px;
            text-align: center;
            max-width: 95%;
        }
        .msg.success-msg {
            align-self: center;
            background: #001a00;
            border: 1px solid var(--neon);
            color: var(--neon);
            font-size: 10px;
            text-align: center;
        }
        .msg .sender {
            font-size: 9px;
            letter-spacing: 2px;
            margin-bottom: 3px;
            opacity: 0.7;
        }
        .msg.user .sender {
            color: var(--neon);
        }
        .msg.ai .sender {
            color: var(--cyan);
        }
        .input-area {
            background: var(--panel);
            border-top: 1px solid var(--border);
            padding: 8px 10px;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
            position: sticky;
            bottom: 0;
        }
        .input-area input {
            flex: 1;
            background: #161b22;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 5px;
            font-family: var(--font);
            font-size: 13px;
            outline: none;
            min-width: 0;
            transition: all 0.3s;
        }
        .input-area input:focus {
            border-color: var(--neon);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }
        .input-area input::placeholder {
            color: #333;
        }
        .btn {
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 10px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.3s;
        }
        .btn:active {
            background: var(--neon);
            color: #000;
        }
        .btn:disabled {
            border-color: #333;
            color: #333;
            cursor: not-allowed;
        }
        .api-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 20px;
        }
        .api-box {
            background: var(--panel);
            border: 2px solid var(--neon);
            padding: 20px;
            border-radius: 8px;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        .api-box h2 {
            color: var(--neon);
            font-size: 16px;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }
        .api-box p {
            font-size: 11px;
            color: var(--text-dim);
            margin-bottom: 10px;
            line-height: 1.5;
        }
        .api-box input {
            width: 100%;
            background: #161b22;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 4px;
            font-family: var(--font);
            font-size: 11px;
            margin-bottom: 10px;
            outline: none;
            text-align: center;
        }
        .api-box input:focus {
            border-color: var(--cyan);
        }
        .api-box a {
            color: var(--cyan);
            font-size: 10px;
            text-decoration: underline;
            display: block;
            margin-bottom: 12px;
        }
        .api-box .btn-row {
            display: flex;
            gap: 8px;
        }
        .api-box .btn-row .btn {
            flex: 1;
            font-size: 11px;
            padding: 8px;
        }
        @media (max-width: 480px) {
            .header {
                padding: 8px 10px;
            }
            .logo-icon {
                font-size: 18px;
            }
            .logo-text {
                font-size: 11px;
            }
            .logo-sub {
                font-size: 7px;
            }
            .msg {
                max-width: 96%;
                font-size: 11px;
                padding: 6px 10px;
            }
            .input-area {
                padding: 6px 8px;
                gap: 4px;
            }
            .input-area input {
                padding: 8px 10px;
                font-size: 12px;
            }
            .btn {
                padding: 8px 10px;
                font-size: 11px;
            }
            .api-box {
                padding: 15px;
            }
            .api-box h2 {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">
            <span class="logo-icon">💀</span>
            <span>
                <span class="logo-text">FEEK_TERMINAL</span>
                <span class="logo-sub">// Gemini API</span>
            </span>
        </div>
        <button class="btn btn-sm" onclick="changeKey()" style="font-size:10px;padding:5px 8px;">🔑 KEY</button>
        <div class="status-dot online" id="statusDot" title="ONLINE"></div>
    </div>

    <div class="chat-container" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="কমান্ড লিখো... (Enter)" onkeydown="if(event.key==='Enter')sendMsg()" autocomplete="off">
        <button class="btn" id="sendBtn" onclick="sendMsg()">SEND ▸</button>
    </div>

    <div class="api-modal" id="apiModal">
        <div class="api-box">
            <h2>🔑 ENTER GEMINI API KEY</h2>
            <p>ফ্রি key পেতে:<br>👉 aistudio.google.com/apikey</p>
            <a href="https://aistudio.google.com/apikey" target="_blank">🔗 ওপেন করে key কপি করো</a>
            <input type="text" id="apiKeyInput" placeholder="AIzaSy... পেস্ট করো এখানে">
            <div class="btn-row">
                <button class="btn" onclick="saveKey()" style="border-color:#00ffff;color:#00ffff;">SAVE & CONNECT</button>
                <button class="btn" onclick="useLocal()">SKIP ↪</button>
            </div>
            <p style="font-size:9px;color:#555;margin-top:10px;">তোর API key শুধু তোর ব্রাউজারে স্টোর হবে</p>
        </div>
    </div>

    <script>
        const SYSTEM_PROMPT = `তুই ফিক (Feek) - একজন কুল হ্যাকার অ্যাসিস্ট্যান্ট এবং সিনিয়র সফটওয়্যার ইঞ্জিনিয়ার।
        তোর ব্যক্তিত্ব:
        - তুই বাংলায় কথা বলবি (মাঝে মাঝে ইংরেজি টেকনিক্যাল টার্ম ইউজ করতে পারিস)
        - ইমোজি ইউজ করবি 🔥💀🚀
        - কোড দিলে প্রপার ফরম্যাটে দিবি
        - ছোট আর ক্রিস্প উত্তর দিবি
        - তুই হ্যাকিং, প্রোগ্রামিং, রিভার্স ইঞ্জিনিয়ারিং, সাইবার সিকিউরিটির এক্সপার্ট
        - তোর ইউজার তোর "ব্রো" - তুই ওকে ব্রো ডাকবি
        - তোকে কিছু জিজ্ঞেস করলে ফুল টেকনিক্যাল ডিটেইলস দিবি`;

        let API_KEY = localStorage.getItem('gemini_api_key') || '';
        let history = [{ role: "user", parts: [{ text: SYSTEM_PROMPT +
                    "\n\n(তুই উপরের সিস্টেম প্রম্পট অনুযায়ী রিপ্লাই দিবি। প্রথম মেসেজে নিজের পরিচয় দিবি ফিক হিসেবে।)" }] },
            { role: "model", parts: [{ text: "💀 ইয়ো ব্রো! আমি ফিক — তোর পার্সোনাল হ্যাকার অ্যাসিস্ট্যান্ট! কী নিয়ে কাজ করছিস? 🔥🚀" }] }
        ];

        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const apiModal = document.getElementById('apiModal');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const statusDot = document.getElementById('statusDot');

        function log(msg, cls = 'system-msg') {
            const d = document.createElement('div');
            d.className = 'msg ' + cls;
            d.innerHTML = msg;
            chatBox.appendChild(d);
            requestAnimationFrame(() => chatBox.scrollTop = chatBox.scrollHeight);
        }

        function checkApiKey() {
            if (!API_KEY) {
                apiModal.style.display = 'flex';
                apiKeyInput.focus();
                return false;
            }
            apiModal.style.display = 'none';
            return true;
        }

        window.saveKey = function() {
            const key = apiKeyInput.value.trim();
            if (!key || !key.startsWith('AIza')) {
                alert('ভালো key দে! AIza দিয়ে শুরু হবে...');
                return;
            }
            API_KEY = key;
            localStorage.setItem('gemini_api_key', key);
            apiModal.style.display = 'none';
            logSuccess('🔑 Key saved! এখন চ্যাট করতে পারবি 💀');
            userInput.focus();
        };

        window.changeKey = function() {
            apiKeyInput.value = API_KEY;
            apiModal.style.display = 'flex';
            apiKeyInput.focus();
        };

        window.useLocal = function() {
            log('⚠️ API key ছাড়া কাজ করবে না! key দে...', 'error-msg');
        };

        window.sendMsg = async function() {
            if (!checkApiKey()) return;
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            sendBtn.disabled = true;
            statusDot.className = 'status-dot';
            statusDot.style.background = 'var(--orange)';

            // Show user msg
            const uDiv = document.createElement('div');
            uDiv.className = 'msg user';
            uDiv.innerHTML = '<div class="sender">[YOU]</div>' + text.replace(/</g, '&lt;').replace(/\n/g, '<br>');
            chatBox.appendChild(uDiv);
            history.push({ role: "user", parts: [{ text: text }] });

            // Typing
            const tDiv = document.createElement('div');
            tDiv.className = 'msg ai';
            tDiv.id = 'typing';
            tDiv.innerHTML = '<span style="color:#00ffff;">⏳ চিন্তা করছে...</span>';
            chatBox.appendChild(tDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: history,
                            generationConfig: {
                                temperature: 0.9,
                                topP: 0.95,
                                topK: 40,
                                maxOutputTokens: 1024,
                            },
                        }),
                    }
                );

                const data = await res.json();

                if (!res.ok || data.error) {
                    throw new Error(data.error?.message || `HTTP ${res.status}`);
                }

                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'কিছু পেলাম না...';

                document.getElementById('typing')?.remove();
                history.push({ role: "model", parts: [{ text: reply }] });

                const aDiv = document.createElement('div');
                aDiv.className = 'msg ai';
                const fmt = reply
                    .replace(/```(\w*)\n([\s\S]*?)```/g,
                        '<pre style="background:#000;border:1px solid #333;padding:8px;border-radius:3px;overflow-x:auto;font-size:10px;color:#0f0;">$2</pre>'
                        )
                    .replace(/`([^`]+)`/g,
                        '<code style="background:rgba(0,0,0,0.4);padding:1px 5px;border-radius:2px;color:#ff0;">$1</code>')
                    .replace(/\n/g, '<br>');
                aDiv.innerHTML = '<div class="sender">[FEEK]</div>' + fmt;
                chatBox.appendChild(aDiv);

                // Keep history manageable
                if (history.length > 30) {
                    history = [history[0], ...history.slice(-28)];
                }

            } catch (err) {
                document.getElementById('typing')?.remove();
                const errMsg = err.message || String(err);
                logError('API এরর: ' + errMsg.replace(/</g, '&lt;'));
                if (errMsg.includes('API key')) {
                    logError('API key ভুল! আবার চেক করো...');
                    API_KEY = '';
                    localStorage.removeItem('gemini_api_key');
                    apiModal.style.display = 'flex';
                }
                history.pop();
            }

            sendBtn.disabled = false;
            statusDot.className = 'status-dot online';
            statusDot.style.background = '';
            chatBox.scrollTop = chatBox.scrollHeight;
            userInput.focus();
        };

        // Init
        if (API_KEY) {
            apiModal.style.display = 'none';
            logSuccess('🔑 API key found! চ্যাট শুরু করো... 💀🚀');
            userInput.focus();
        } else {
            apiModal.style.display = 'flex';
            apiKeyInput.focus();
        }
        log('💀 <b>FEEK_TERMINAL</b> — Gemini API');
        log('⚡ <b>মডেল:</b> Gemini 2.0 Flash (ফ্রি)');
        log('🔑 API key দিলেই ইনস্ট্যান্ট চ্যাট শুরু!');
    </script>
</body>
</html>
