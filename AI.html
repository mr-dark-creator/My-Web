<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEEK_TERMINAL // Transformers.js</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --panel: #0d1117;
            --neon: #00ff41;
            --neon-dim: #00cc33;
            --cyan: #00ffff;
            --red: #ff3333;
            --yellow: #ffcc00;
            --orange: #ff9900;
            --text: #c9d1d9;
            --text-dim: #8b949e;
            --border: #1f2937;
            --font: 'Courier New', 'Fira Code', monospace;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
        }
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg,
                    transparent, transparent 2px,
                    rgba(0, 255, 65, 0.012) 2px,
                    rgba(0, 255, 65, 0.012) 4px);
            pointer-events: none;
            z-index: 9999;
        }
        .header {
            background: var(--panel);
            border-bottom: 2px solid var(--neon);
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        .logo-icon {
            font-size: 24px;
            flex-shrink: 0;
        }
        .logo-text {
            font-size: 13px;
            font-weight: bold;
            color: var(--neon);
            letter-spacing: 2px;
            text-shadow: 0 0 8px var(--neon);
            white-space: nowrap;
        }
        .logo-sub {
            font-size: 9px;
            color: var(--text-dim);
            display: block;
            letter-spacing: 1px;
            text-shadow: none;
            font-weight: normal;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--red);
            flex-shrink: 0;
            transition: all 0.5s;
        }
        .status-dot.online {
            background: var(--neon);
            box-shadow: 0 0 15px var(--neon);
            animation: glow 1.5s infinite;
        }
        .status-dot.loading {
            background: var(--orange);
            box-shadow: 0 0 10px var(--orange);
            animation: blink 0.6s infinite;
        }
        @keyframes glow {
            0%,
            100% {
                box-shadow: 0 0 10px var(--neon);
            }
            50% {
                box-shadow: 0 0 25px var(--neon), 0 0 40px var(--neon-dim);
            }
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            -webkit-overflow-scrolling: touch;
        }
        .chat-container::-webkit-scrollbar {
            width: 2px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: var(--neon-dim);
            border-radius: 2px;
        }
        .msg {
            max-width: 92%;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.5;
            word-break: break-word;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .msg.user {
            align-self: flex-end;
            background: #0f1f15;
            border: 1px solid var(--neon-dim);
            color: #b8ffc4;
            border-radius: 10px 3px 10px 10px;
        }
        .msg.ai {
            align-self: flex-start;
            background: #0f1622;
            border: 1px solid #1e3a5f;
            color: #c9e4ff;
            border-radius: 3px 10px 10px 10px;
        }
        .msg.system-msg {
            align-self: center;
            background: transparent;
            border: 1px dashed #222;
            color: var(--text-dim);
            font-size: 10px;
            text-align: center;
            max-width: 100%;
        }
        .msg.error-msg {
            align-self: center;
            background: #1a0000;
            border: 1px solid var(--red);
            color: #ff6666;
            font-size: 10px;
            text-align: center;
            max-width: 95%;
        }
        .msg.success-msg {
            align-self: center;
            background: #001a00;
            border: 1px solid var(--neon);
            color: var(--neon);
            font-size: 10px;
            text-align: center;
        }
        .msg .sender {
            font-size: 9px;
            letter-spacing: 2px;
            margin-bottom: 3px;
            opacity: 0.7;
        }
        .msg.user .sender {
            color: var(--neon);
        }
        .msg.ai .sender {
            color: var(--cyan);
        }
        .input-area {
            background: var(--panel);
            border-top: 1px solid var(--border);
            padding: 8px 10px;
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
            position: sticky;
            bottom: 0;
        }
        .input-area input {
            flex: 1;
            background: #161b22;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 12px;
            border-radius: 5px;
            font-family: var(--font);
            font-size: 13px;
            outline: none;
            min-width: 0;
            transition: all 0.3s;
        }
        .input-area input:focus {
            border-color: var(--neon);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }
        .input-area input::placeholder {
            color: #333;
        }
        .btn {
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 10px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-family: var(--font);
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.3s;
        }
        .btn:active {
            background: var(--neon);
            color: #000;
        }
        .btn:disabled {
            border-color: #333;
            color: #333;
            cursor: not-allowed;
        }
        .btn-sm {
            font-size: 10px;
            padding: 6px 10px;
            letter-spacing: 0;
        }
        @media (max-width: 480px) {
            .header {
                padding: 8px 10px;
            }
            .logo-icon {
                font-size: 20px;
            }
            .logo-text {
                font-size: 11px;
            }
            .logo-sub {
                font-size: 8px;
            }
            .msg {
                max-width: 96%;
                font-size: 11px;
                padding: 6px 10px;
            }
            .input-area {
                padding: 6px 8px;
                gap: 4px;
            }
            .input-area input {
                padding: 8px 10px;
                font-size: 12px;
            }
            .btn {
                padding: 8px 10px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">
            <span class="logo-icon">💀</span>
            <span>
                <span class="logo-text">FEEK_TERMINAL</span>
                <span class="logo-sub">// Transformers.js</span>
            </span>
        </div>
        <button class="btn btn-sm" onclick="retryLoad()" id="retryBtn">RETRY 🔄</button>
        <div class="status-dot" id="statusDot" title="STATUS"></div>
    </div>

    <div class="chat-container" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="কমান্ড... (Enter)" onkeydown="if(event.key==='Enter')sendMsg()" autocomplete="off" disabled>
        <button class="btn" id="sendBtn" onclick="sendMsg()" disabled>SEND ▸</button>
    </div>

    <script type="module">
        import { pipeline } from "https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.0.2/dist/transformers.min.js";

        const SYSTEM_PROMPT = `তুই ফিক (Feek) - একজন কুল হ্যাকার অ্যাসিস্ট্যান্ট। তুই বাংলায় কথা বলবি, ইমোজি ইউজ করবি, কোড দিলে প্রপার ফরম্যাটে দিবি। তুই হ্যাকিং, প্রোগ্রামিং, সাইবার সিকিউরিটির এক্সপার্ট।`;

        let generator = null;
        let isReady = false;
        let history = [];

        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const retryBtn = document.getElementById('retryBtn');

        function log(msg, cls = 'system-msg') {
            const d = document.createElement('div');
            d.className = 'msg ' + cls;
            d.innerHTML = msg;
            chatBox.appendChild(d);
            requestAnimationFrame(() => chatBox.scrollTop = chatBox.scrollHeight);
        }

        function logError(msg) { log('❌ ' + msg, 'error-msg'); }

        function logSuccess(msg) { log('✅ ' + msg, 'success-msg'); }

        function setStatus(s) {
            statusDot.className = 'status-dot';
            if (s === 'online') { statusDot.classList.add('online');
                statusDot.title = 'ONLINE'; } else if (s === 'loading') { statusDot.classList.add('loading');
                statusDot.title = 'LOADING...'; } else { statusDot.title = 'OFFLINE'; }
        }

        function enableInput(yes) {
            userInput.disabled = !yes;
            sendBtn.disabled = !yes;
            if (yes) userInput.focus();
        }

        function buildPrompt() {
            let prompt = SYSTEM_PROMPT + '\n\n';
            for (const msg of history) {
                if (msg.role === 'user') prompt += 'User: ' + msg.content + '\n';
                if (msg.role === 'assistant') prompt += 'Feek: ' + msg.content + '\n';
            }
            prompt += 'Feek:';
            return prompt;
        }

        async function initModel() {
            setStatus('loading');
            enableInput(false);
            isReady = false;
            retryBtn.disabled = true;

            log('🔍 <b>ব্যাকএন্ড:</b> WebGL + WebAssembly');
            log('🌐 <b>Browser:</b> ' + (navigator.userAgent.match(/(Chrome|Edge|Firefox)\/[0-9.]+/)?.[0] ||
                'Unknown'));
            log('📱 <b>Platform:</b> ' + navigator.platform);
            log('📦 <b>মডেল:</b> TinyLlama 1.1B (~650MB)');
            log('⏱️ প্রথমবার ডাউনলোড ১-২ মিনিট...');

            try {
                const startTime = Date.now();

                generator = await pipeline(
                    'text-generation',
                    'onnx-community/TinyLlama-1.1B-Chat-v1.0',
                    {
                        dtype: 'q4f16',
                        device: 'webgpu',
                        progress_callback: (info) => {
                            if (info.status === 'progress' && info.progress) {
                                const pct = (info.progress * 100).toFixed(1);
                                log(`📥 <b>${pct}%</b> — ${info.file || 'ডাউনলোড...'}`);
                            }
                            if (info.status === 'downloading') {
                                log(`📥 ডাউনলোড: <b>${info.file || '...'}</b>`);
                            }
                        },
                    }
                );

                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                isReady = true;
                setStatus('online');
                enableInput(true);
                retryBtn.disabled = false;
                logSuccess(`AI READY! ⚡ (${elapsed}s)<br>Transformers.js + TinyLlama<br>প্রশ্ন করো ব্রো... 💀🚀`);
                userInput.focus();

            } catch (err) {
                console.error(err);
                const msg = err.message || String(err);

                if (msg.includes('webgpu') || msg.includes('WebGPU') || msg.includes('GPU')) {
                    logError('WebGPU ফেইল! WebGL দিয়ে ট্রাই করছি...');
                    try {
                        const startTime = Date.now();
                        generator = await pipeline(
                            'text-generation',
                            'onnx-community/TinyLlama-1.1B-Chat-v1.0',
                            {
                                dtype: 'q4f16',
                                device: 'wasm',
                                progress_callback: (info) => {
                                    if (info.status === 'progress' && info.progress) {
                                        const pct = (info.progress * 100).toFixed(1);
                                        log(`📥 <b>${pct}%</b> — ${info.file || ''}`);
                                    }
                                },
                            }
                        );
                        const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                        isReady = true;
                        setStatus('online');
                        enableInput(true);
                        retryBtn.disabled = false;
                        logSuccess(
                            `AI READY! ⚡ (${elapsed}s)<br>WebAssembly ব্যাকএন্ড<br>একটু স্লো কিন্তু কাজ করবে 💀🚀`);
                        userInput.focus();
                        return;
                    } catch (err2) {
                        logError('WebAssembly ও ফেইল!<br>এরর: ' + (err2.message || err2));
                    }
                }

                logError('মডেল লোড ফেইল!<br><b>এরর:</b> ' + msg.replace(/</g, '&lt;'));
                if (msg.includes('fetch') || msg.includes('network')) {
                    logError('নেটওয়ার্ক ইস্যু! CDN/HuggingFace ব্লক হতে পারে');
                }
                setStatus('offline');
                retryBtn.disabled = false;
            }
        }

        window.retryLoad = function() {
            chatBox.innerHTML = '';
            log('🔄 রিট্রাই করছি...');
            generator = null;
            history = [];
            initModel();
        };

        window.sendMsg = async function() {
            if (!isReady || !generator) return;
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            enableInput(false);
            history.push({ role: 'user', content: text });

            const uDiv = document.createElement('div');
            uDiv.className = 'msg user';
            uDiv.innerHTML = '<div class="sender">[YOU]</div>' + text.replace(/</g, '&lt;');
            chatBox.appendChild(uDiv);

            const tDiv = document.createElement('div');
            tDiv.className = 'msg ai';
            tDiv.id = 'typing';
            tDiv.innerHTML = '<span style="color:#00ffff;">⏳ জেনারেট করছে...</span>';
            chatBox.appendChild(tDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const prompt = buildPrompt();
                const result = await generator(prompt, {
                    max_new_tokens: 300,
                    temperature: 0.7,
                    do_sample: true,
                    top_p: 0.9,
                });

                document.getElementById('typing')?.remove();
                let reply = result[0].generated_text;

                if (reply.includes('Feek:')) {
                    reply = reply.split('Feek:').pop().trim();
                }

                if (!reply || reply.length < 2) {
                    reply = '🤔 কিছু বলতে পারলাম না, আবার ট্রাই করো ব্রো...';
                }

                history.push({ role: 'assistant', content: reply });

                const aDiv = document.createElement('div');
                aDiv.className = 'msg ai';
                const fmt = reply
                    .replace(/```(\w*)\n([\s\S]*?)```/g,
                        '<pre style="background:#000;border:1px solid #333;padding:8px;border-radius:3px;overflow-x:auto;font-size:10px;color:#0f0;">$2</pre>'
                        )
                    .replace(/`([^`]+)`/g,
                        '<code style="background:rgba(0,0,0,0.4);padding:1px 5px;border-radius:2px;color:#ff0;">$1</code>')
                    .replace(/\n/g, '<br>');
                aDiv.innerHTML = '<div class="sender">[FEEK]</div>' + fmt;
                chatBox.appendChild(aDiv);

                if (history.length > 16) {
                    history = history.slice(-14);
                }
            } catch (err) {
                document.getElementById('typing')?.remove();
                logError('জেনারেশন ফেইল: ' + (err.message || err));
                history.pop();
            }

            enableInput(true);
            chatBox.scrollTop = chatBox.scrollHeight;
            userInput.focus();
        };

        log('💀 <b>FEEK_TERMINAL</b> — Transformers.js');
        log('🔧 WebGL + WebAssembly ব্যাকএন্ড');
        log('📦 TinyLlama 1.1B Chat (650MB)');
        initModel();
    </script>
</body>
</html>
